<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>I Giganti della Sardegna</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
html,body{margin:0;height:100%;font-family:Arial}
#home,#mapPage{height:100dvh;display:none}
.show{display:block}
#home{background:#111;color:#fff;text-align:center;padding-top:20vh}
button,select,input{padding:10px;margin:4px;border-radius:12px;border:none}
#top{background:#111;color:#fff;padding:8px}
#map{height:calc(100dvh - 110px)}
#foot{background:#111;color:#fff;text-align:center;padding:10px}
</style>
</head>
<body>

<div id="home" class="show">
<h1>I Giganti della Sardegna</h1>
<button onclick="openMap()">MAP INTERATTIVO</button>
<div id="foot"><b>PASSAMONTI</b>_COMMUNICATION</div>
</div>

<div id="mapPage">
<div id="top">
<button onclick="goHome()">Home</button>
<button onclick="gps()">GPS</button>
<select id="lang" onchange="setLang()">
<option value="it">🇮🇹</option>
<option value="en">🇬🇧</option>
<option value="fr">🇫🇷</option>
<option value="es">🇪🇸</option>
<option value="de">🇩🇪</option>
</select>
</div>
<div id="map"></div>
<div id="foot"><b>PASSAMONTI</b>_COMMUNICATION</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let map,lang='it',started=false;

const data=[
['Bosa','Borgo','Bosa',40.3,8.5,'blue','Bosa'],
['Su Nuraxi','Nuraghe','Barumini',39.703,8.999,'red','Su_Nuraxi'],
['Anghelu Ruju','Domus',40.6275,8.3197,'green','Anghelu_Ruju'],
['Palmavera','Nuraghe','Alghero',40.604,8.254,'red','Palmavera'],
['Castelsardo','Borgo','Castelsardo',40.92,8.71,'blue','Castelsardo']
];

function openMap(){
document.getElementById('home').classList.remove('show');
document.getElementById('mapPage').classList.add('show');

if(!started){
map=L.map('map').setView([40,9],8);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

data.forEach(p=>{
L.circleMarker([p[3],p[4]],{
radius:7,color:p[5],fillColor:p[5],fillOpacity:1
}).addTo(map).bindPopup(
'<b><a target=_blank href=https://'+lang+'.wikipedia.org/wiki/'+p[6]+'>'+p[0]+'</a></b><br>'+p[1]
);
});

started=true;
setTimeout(()=>map.invalidateSize(),300);
}
}

function goHome(){
document.getElementById('mapPage').classList.remove('show');
document.getElementById('home').classList.add('show');
}

function setLang(){
lang=document.getElementById('lang').value;
location.reload();
}

function gps(){
navigator.geolocation.getCurrentPosition(pos=>{
map.setView([pos.coords.latitude,pos.coords.longitude],10);
});
}
</script>
</body>
</html>
