<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>I Giganti della Sardegna</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
  margin:0;
  padding:0;
  height:100%;
  font-family:Arial,sans-serif;
}

.page{
  display:none;
  height:100dvh;
}

.show{
  display:block;
}

/* HOME */
#home{
  background:url('image.png') center/cover no-repeat;
  color:#fff;
}

.overlay{
  height:100%;
  background:rgba(0,0,0,.45);
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  align-items:center;
}

.title{
  margin-top:8vh;
  font-size:clamp(34px,8vw,70px);
  font-weight:900;
  text-align:center;
  color:#f3d18b;
  padding:0 15px;
}

.main-btn{
  padding:14px 22px;
  border:none;
  border-radius:28px;
  background:#f3d18b;
  color:#111;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
}

.footer{
  width:100%;
  background:#111;
  color:#fff;
  text-align:center;
  padding:12px;
}

.footer b{
  font-weight:900;
}

/* MAPPA */
.topbar{
  background:#111;
  color:#fff;
  padding:8px;
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  align-items:center;
}

.topbar button,
.topbar select,
.topbar input{
  padding:8px 10px;
  border:none;
  border-radius:18px;
}

#map{
  width:100%;
  height:calc(100dvh - 150px);
}

.rss-wrap{
  background:#111;
  color:#fff;
  overflow:hidden;
  white-space:nowrap;
  padding:8px;
}

.rss{
  display:inline-block;
  animation:scroll 20s linear infinite;
}

@keyframes scroll{
  from{transform:translateX(100%)}
  to{transform:translateX(-100%)}
}

a{
  color:#0056ff;
}
</style>
</head>

<body>

<!-- PAGINA 1 -->
<section id="home" class="page show">
  <div class="overlay">
    <div class="title">I Giganti della Sardegna</div>

    <button class="main-btn" onclick="openMap()">
      MAP INTERATTIVO
    </button>

    <div class="footer">
      <b>PASSAMONTI</b>_COMMUNICATION
    </div>
  </div>
</section>

<!-- PAGINA 2 -->
<section id="mapPage" class="page">

  <div class="topbar">
    <strong>I Giganti della Sardegna</strong>

    <button onclick="goHome()">Home</button>
    <button onclick="gpsLocate()">GPS</button>

    <select id="lang" onchange="changeLang()">
      <option value="it">🇮🇹</option>
      <option value="en">🇬🇧</option>
      <option value="fr">🇫🇷</option>
      <option value="es">🇪🇸</option>
      <option value="de">🇩🇪</option>
    </select>

    <select id="area" onchange="filterArea()">
      <option value="all">Area</option>
      <option value="nord">Nord</option>
      <option value="centro">Centro</option>
      <option value="sud">Sud</option>
    </select>

    <input id="search" placeholder="Cerca luogo">
    <button onclick="searchPlace()">Vai</button>
  </div>

  <div id="map"></div>

  <div class="rss-wrap">
    <div class="rss">
      prova prova prova • prova prova prova • prova prova prova •
    </div>
  </div>

  <div class="footer">
    <b>PASSAMONTI</b>_COMMUNICATION
  </div>

</section>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map;
let markers=[];
let started=false;
let currentLang="it";

/* DATABASE */
const places = [
["Bosa","Borgo","Bosa",40.3000,8.5000,"blue","Bosa","nord"],
["Castelsardo","Borgo","Castelsardo",40.9200,8.7100,"blue","Castelsardo","nord"],
["Lollove","Borgo","Nuoro",40.3650,9.3324,"blue","Lollove","nord"],
["Su Nuraxi","Nuraghe","Barumini",39.703,8.999,"red","Su_Nuraxi","sud"],
["Nuraghe Arrubiu","Nuraghe","Orroli",39.662,9.298,"red","Nuraghe_Arrubiu","sud"],
["Anghelu Ruju","Domus de Janas","Alghero",40.6275,8.3197,"green","Anghelu_Ruju","nord"],
["Montessu","Domus de Janas","Villaperuccio",39.1242,8.6658,"green","Necropoli_di_Montessu","sud"]
];

function openMap(){
  document.getElementById("home").classList.remove("show");
  document.getElementById("mapPage").classList.add("show");

  if(!started){
    map = L.map("map").setView([40,9],8);

    L.tileLayer(
      "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
      {maxZoom:19}
    ).addTo(map);

    drawMarkers(places);
    started=true;

    setTimeout(()=>map.invalidateSize(),300);
  }else{
    setTimeout(()=>map.invalidateSize(),200);
  }
}

function goHome(){
  document.getElementById("mapPage").classList.remove("show");
  document.getElementById("home").classList.add("show");
}

function wikiUrl(slug){
  return `https://${currentLang}.wikipedia.org/wiki/${slug}`;
}

function popupHTML(p){
  return `
    <b>
      <a target="_blank" href="${wikiUrl(p[6])}">
        ${p[0]}
      </a>
    </b><br>
    Tipo: ${p[1]}<br>
    Comune: ${p[2]}<br>
    Descrizione: Luogo storico della Sardegna.
  `;
}

function drawMarkers(data){
  markers.forEach(m=>map.removeLayer(m));
  markers=[];

  data.forEach(p=>{
    const marker = L.circleMarker(
      [p[3],p[4]],
      {
        radius:7,
        color:p[5],
        fillColor:p[5],
        fillOpacity:1
      }
    ).addTo(map).bindPopup(popupHTML(p));

    markers.push(marker);
  });
}

function filterArea(){
  const selected = document.getElementById("area").value;

  if(selected==="all"){
    drawMarkers(places);
  }else{
    drawMarkers(
      places.filter(p=>p[7]===selected)
    );
  }
}

function changeLang(){
  currentLang = document.getElementById("lang").value;

  const selected = document.getElementById("area").value;

  if(selected==="all"){
    drawMarkers(places);
  }else{
    drawMarkers(
      places.filter(p=>p[7]===selected)
    );
  }
}

function searchPlace(){
  const q = document.getElementById("search").value.toLowerCase();

  const found = places.find(p =>
    p[0].toLowerCase().includes(q)
  );

  if(found){
    map.setView([found[3],found[4]],12);
  }
}

function gpsLocate(){
  navigator.geolocation.getCurrentPosition(
    pos=>{
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;

      map.setView([lat,lng],10);

      L.marker([lat,lng])
        .addTo(map)
        .bindPopup("Sei qui")
        .openPopup();
    },
    ()=>{
      alert("GPS non disponibile");
    }
  );
}

window.addEventListener("resize",()=>{
  if(map) map.invalidateSize();
});
</script>

</body>
</html>
