<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>I Giganti della Sardegna</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
html,body{margin:0;height:100%;font-family:Arial,sans-serif} .page{display:none;height:100%}.show{display:block}
.home{background:url('image.png') center/cover no-repeat}.overlay{height:100%;background:rgba(0,0,0,.45);display:flex;flex-direction:column;justify-content:space-between;align-items:center;color:#f3d18b}
.title{font-size:clamp(34px,8vw,68px);font-weight:800;padding-top:8vh;text-align:center;padding-inline:10px}
.btn,.topbar button,select{padding:10px 14px;border:none;border-radius:22px;font-weight:700}
.btn{background:#f3d18b;color:#111}.topbar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;background:#111;color:#fff;padding:8px}.footer{background:#111;color:#fff;text-align:center;padding:12px}.footer b{font-weight:900}
#map{height:calc(100% - 140px)} .rssWrap{background:#111;color:#fff;overflow:hidden;white-space:nowrap;padding:8px}.rss{display:inline-block;animation:mar 20s linear infinite}@keyframes mar{from{transform:translateX(100%)}to{transform:translateX(-100%)}}
a{color:#0b57d0}
</style>
</head>
<body>
<section id='home' class='page show home'>
<div class='overlay'>
<div class='title'>I Giganti della Sardegna</div>
<button class='btn' onclick='goMap()'>MAP INTERATTIVO</button>
<div class='footer'><b>PASSAMONTI</b>_COMMUNICATION</div>
</div>
</section>
<section id='mapPage' class='page'>
<div class='topbar'>
<strong id='ttl'>I Giganti della Sardegna</strong>
<button onclick='goHome()' id='bhome'>Home</button>
<button onclick='gps()' id='bgps'>GPS</button>
<select id='lang' onchange='setLang()'>
<option value='it'>🇮🇹 IT</option><option value='en'>🇬🇧 EN</option><option value='fr'>🇫🇷 FR</option><option value='es'>🇪🇸 ES</option><option value='de'>🇩🇪 DE</option></select>
<select id='area' onchange='filterArea()'>
<option value='all'>Seleziona area</option><option value='nord'>Nord</option><option value='centro'>Centro</option><option value='sud'>Sud</option></select>
</div>
<div id='map'></div>
<div class='rssWrap'><div class='rss'>prova prova prova • prova prova prova • prova prova prova • prova prova prova • </div></div>
<div class='footer'><b>PASSAMONTI</b>_COMMUNICATION</div>
</section>
<script src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js'></script>
<script>
let map,markers=[],started=false;
const pts=[
['Lollove','Borgo','Nuoro',40.3650,9.3324,'orange','https://it.wikipedia.org/wiki/Lollove','nord'],
['Tempio Pausania','Borgo','Tempio Pausania',40.9000,9.1000,'orange','https://it.wikipedia.org/wiki/Tempio_Pausania','nord'],
['Aggius','Borgo','Aggius',40.9300,8.9800,'orange','https://it.wikipedia.org/wiki/Aggius','nord'],
['Atzara','Borgo','Atzara',39.9900,9.0700,'orange','https://it.wikipedia.org/wiki/Atzara','centro'],
['Bosa','Borgo','Bosa',40.3000,8.5000,'orange','https://it.wikipedia.org/wiki/Bosa','nord'],
['Carloforte','Borgo','Carloforte',39.1400,8.3000,'orange','https://it.wikipedia.org/wiki/Carloforte','sud'],
['Castelsardo','Borgo','Castelsardo',40.9200,8.7100,'orange','https://it.wikipedia.org/wiki/Castelsardo','nord'],
['Su Nuraxi','Nuraghe','Barumini',39.703,8.999,'red','https://it.wikipedia.org/wiki/Su_Nuraxi','sud'],
['Nuraghe Arrubiu','Nuraghe','Orroli',39.662,9.298,'red','https://it.wikipedia.org/wiki/Nuraghe_Arrubiu','sud'],
['Funtana Coberta','Nuraghe','Ballao',39.584,9.383,'red','https://it.wikipedia.org/wiki/Funtana_Coberta','sud'],
['Anghelu Ruju','Domus de Janas','Alghero',40.6275,8.3197,'gold','https://it.wikipedia.org/wiki/Anghelu_Ruju','nord'],
['Su Crucifissu Mannu','Domus de Janas','Porto Torres',40.8100,8.4400,'gold','https://it.wikipedia.org/wiki/Su_Crucifissu_Mannu','nord'],
['Sant Andrea Priu','Domus de Janas','Bonorva',40.4194,8.8358,'gold','https://it.wikipedia.org/wiki/Necropoli_di_Sant%27Andrea_Priu','centro'],
['Puttu Codinu','Domus de Janas','Villanova Monteleone',40.4853,8.4419,'gold','https://it.wikipedia.org/wiki/Necropoli_di_Puttu_Codinu','nord'],
['Montessu','Domus de Janas','Villaperuccio',39.1242,8.6658,'gold','https://it.wikipedia.org/wiki/Necropoli_di_Montessu','sud'],
['Pranu Mutteddu','Domus de Janas','Goni',39.5761,9.2781,'gold','https://it.wikipedia.org/wiki/Pranu_Mutteddu','sud']];
function goMap(){home.classList.remove('show');mapPage.classList.add('show');if(!started){map=L.map('map').setView([40,9],8);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);render(pts);started=true;setTimeout(()=>map.invalidateSize(),300);}}
function goHome(){mapPage.classList.remove('show');home.classList.add('show');}
function popup(p){return `<b><a target='_blank' href='${p[6]}'>${p[0]}</a></b><br>Tipo: ${p[1]}<br>Comune: ${p[2]}<br>Descrizione: Luogo storico e culturale della Sardegna.`}
function render(arr){markers.forEach(m=>map.removeLayer(m));markers=[];arr.forEach(p=>{let m=L.circleMarker([p[3],p[4]],{radius:7,color:p[5],fillColor:p[5],fillOpacity:1}).addTo(map).bindPopup(popup(p));markers.push(m);});}
function gps(){navigator.geolocation.getCurrentPosition(pos=>{const me=[pos.coords.latitude,pos.coords.longitude];map.setView(me,10);L.marker(me).addTo(map).bindPopup('Sei qui').openPopup();},()=>alert('GPS non disponibile'));}
function filterArea(){const v=area.value;render(v==='all'?pts:pts.filter(x=>x[7]===v));}
function setLang(){const l=lang.value;const t={it:['Home','Seleziona area'],en:['Home','Select area'],fr:['Accueil','Sélection zone'],es:['Inicio','Seleccionar zona'],de:['Start','Bereich wählen']};bhome.textContent=t[l][0];area.options[0].text=t[l][1];}
</script>
</body>
</html>
