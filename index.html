<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>I Giganti della Sardegna</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
html,body{margin:0;height:100%;font-family:Arial,sans-serif}
.page{display:none;height:100dvh}.show{display:block}
#home{background:url('image.png') center/cover no-repeat;color:#fff}
.overlay{height:100%;background:rgba(0,0,0,.45);display:flex;flex-direction:column;justify-content:space-between;align-items:center}
.title{margin-top:8vh;font-size:clamp(34px,8vw,70px);font-weight:900;color:#f3d18b;text-align:center;padding:0 15px}
.main-btn{padding:14px 22px;border:none;border-radius:28px;background:#f3d18b;font-weight:700;cursor:pointer}
.footer{background:#111;color:#fff;text-align:center;padding:12px;width:100%}.footer b{font-weight:900}
.topbar{background:#111;color:#fff;padding:8px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.topbar button,.topbar select,.topbar input{padding:8px 10px;border:none;border-radius:18px}
#map{height:calc(100dvh - 150px)}
.rss-wrap{background:#111;color:#fff;overflow:hidden;white-space:nowrap;padding:8px}
.rss{display:inline-block;animation:scroll 20s linear infinite}
@keyframes scroll{from{transform:translateX(100%)}to{transform:translateX(-100%)}}
a{color:#0056ff}
</style>
</head>
<body>

<section id="home" class="page show">
<div class="overlay">
<div class="title">I Giganti della Sardegna</div>
<button class="main-btn" onclick="openMap()">MAP INTERATTIVO</button>
<div class="footer"><b>PASSAMONTI</b>_COMMUNICATION</div>
</div>
</section>

<section id="mapPage" class="page">
<div class="topbar">
<strong>I Giganti della Sardegna</strong>
<button onclick="goHome()">Home</button>
<button onclick="gpsLocate()">GPS</button>

<select id="lang" onchange="changeLang()">
<option value="it">🇮🇹</option>
<option value="en">🇬🇧</option>
<option value="fr">🇫🇷</option>
<option value="es">🇪🇸</option>
<option value="de">🇩🇪</option>
</select>

<select id="filter" onchange="applyFilter()">
<option value="all">Tutti</option>
<option value="Borgo">Borghi</option>
<option value="Nuraghe">Nuraghi</option>
<option value="Domus de Janas">Domus</option>
<option value="Comune">Comuni</option>
</select>

<input id="search" placeholder="Cerca luogo">
<button onclick="searchPlace()">Vai</button>
</div>

<div id="map"></div>

<div class="rss-wrap">
<div class="rss">prova prova prova • prova prova prova • prova prova prova •</div>
</div>

<div class="footer"><b>PASSAMONTI</b>_COMMUNICATION</div>
</section>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map,markers=[],started=false,currentLang="it";

/* DATASET COMPLETO */
const places = [

/* BORGHI */
["Lollove","Borgo","Nuoro",40.3650,9.3324,"blue","Lollove"],
["Tempio Pausania","Borgo","Tempio Pausania",40.9000,9.1000,"blue","Tempio_Pausania"],
["Aggius","Borgo","Aggius",40.9300,8.9800,"blue","Aggius"],
["Atzara","Borgo","Atzara",39.9900,9.0700,"blue","Atzara"],
["Bosa","Borgo","Bosa",40.3000,8.5000,"blue","Bosa"],
["Carloforte","Borgo","Carloforte",39.1400,8.3000,"blue","Carloforte"],
["Galtellì","Borgo","Galtellì",40.3900,9.6100,"blue","Galtelli"],
["Laconi","Borgo","Laconi",39.8500,9.0500,"blue","Laconi"],
["La Maddalena","Borgo","La Maddalena",41.2100,9.4100,"blue","La_Maddalena"],
["Oliena","Borgo","Oliena",40.2700,9.4000,"blue","Oliena"],
["Posada","Borgo","Posada",40.6300,9.7200,"blue","Posada"],
["Sadali","Borgo","Sadali",39.8200,9.2700,"blue","Sadali"],
["Sardara","Borgo","Sardara",39.6200,8.8200,"blue","Sardara"],
["Gavoi","Borgo","Gavoi",40.1600,9.2000,"blue","Gavoi"],
["Castelsardo","Borgo","Castelsardo",40.9200,8.7100,"blue","Castelsardo"],

/* DOMUS */
["Anghelu Ruju","Domus de Janas","Alghero",40.6275,8.3197,"green","Anghelu_Ruju"],
["Su Crucifissu Mannu","Domus de Janas","Porto Torres",40.8100,8.4444,"green","Su_Crucifissu_Mannu"],
["Roccia dell'Elefante","Domus de Janas","Castelsardo",40.8894,8.7461,"green","Roccia_dell'Elefante"],
["Sant'Andrea Priu","Domus de Janas","Bonorva",40.4194,8.8358,"green","Necropoli_di_Sant%27Andrea_Priu"],
["Puttu Codinu","Domus de Janas","Villanova Monteleone",40.4853,8.4419,"green","Necropoli_di_Puttu_Codinu"],
["Mesu 'e Montes","Domus de Janas","Ossi",40.6389,8.5831,"green","Ossi"],
["Monte Siseri","Domus de Janas","Putifigari",40.5731,8.3964,"green","Putifigari"],
["Sa Pala Larga","Domus de Janas","Bonorva",40.4180,8.8475,"green","Bonorva"],
["Sos Forrighesos","Domus de Janas","Anela",40.4356,9.0272,"green","Anela"],
["Ispiluncas","Domus de Janas","Sedilo",40.1656,8.9247,"green","Sedilo"],
["Brodu","Domus de Janas","Oniferi",40.2378,9.1764,"green","Oniferi"],
["Istevene","Domus de Janas","Mamoiada",40.2225,9.2742,"green","Mamoiada"],
["Montessu","Domus de Janas","Villaperuccio",39.1242,8.6658,"green","Necropoli_di_Montessu"],
["Pranu Mutteddu","Domus de Janas","Goni",39.5761,9.2781,"green","Pranu_Mutteddu"],

/* COMUNI / NURAGHI UNESCO */
["Arzachena","Comune","Arzachena",41.0760,9.3920,"white","Arzachena"],
["Perfugas","Comune","Perfugas",40.8340,8.8830,"white","Perfugas"],
["Bitti","Comune","Bitti",40.4770,9.3840,"white","Bitti"],
["Torralba","Comune","Torralba",40.5130,8.7600,"white","Torralba"],
["Dorgali","Comune","Dorgali",40.2920,9.5880,"white","Dorgali"],
["Barumini","Comune","Barumini",39.7040,9.0040,"white","Barumini"],
["Orroli","Comune","Orroli",39.6930,9.2500,"white","Orroli"],
["Ballao","Comune","Ballao",39.5480,9.3610,"white","Ballao"]
];

function openMap(){
document.getElementById("home").classList.remove("show");
document.getElementById("mapPage").classList.add("show");

if(!started){
map=L.map("map").setView([40,9],8);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19}).addTo(map);
drawMarkers(places);
started=true;
setTimeout(()=>map.invalidateSize(),300);
}else{
setTimeout(()=>map.invalidateSize(),200);
}
}

function goHome(){
document.getElementById("mapPage").classList.remove("show");
document.getElementById("home").classList.add("show");
}

function wikiUrl(slug){
return "https://"+currentLang+".wikipedia.org/wiki/"+slug;
}

function popupHTML(p){
return `
<b><a target="_blank" href="${wikiUrl(p[6])}">${p[0]}</a></b><br>
Tipo: ${p[1]}<br>
Comune: ${p[2]}
`;
}

function drawMarkers(data){
markers.forEach(m=>map.removeLayer(m));
markers=[];

data.forEach(p=>{
let style;

if(p[1]==="Comune"){
style={
radius:7,
color:"#ffffff",
fillOpacity:0,
weight:2
};
}else{
style={
radius:7,
color:p[5],
fillColor:p[5],
fillOpacity:1
};
}

const mk=L.circleMarker([p[3],p[4]],style)
.addTo(map)
.bindPopup(popupHTML(p));

markers.push(mk);
});
}

function applyFilter(){
const val=document.getElementById("filter").value;

if(val==="all"){
drawMarkers(places);
}else{
drawMarkers(places.filter(p=>p[1]===val));
}
}

function changeLang(){
currentLang=document.getElementById("lang").value;
applyFilter();
}

function searchPlace(){
const q=document.getElementById("search").value.toLowerCase();
const found=places.find(p=>p[0].toLowerCase().includes(q));
if(found){
map.setView([found[3],found[4]],12);
}
}

function gpsLocate(){
navigator.geolocation.getCurrentPosition(
pos=>{
map.setView([pos.coords.latitude,pos.coords.longitude],10);
L.marker([pos.coords.latitude,pos.coords.longitude]).addTo(map).bindPopup("Sei qui").openPopup();
},
()=>alert("GPS non disponibile")
);
}

window.addEventListener("resize",()=>{
if(map) map.invalidateSize();
});
</script>

</body>
</html>
